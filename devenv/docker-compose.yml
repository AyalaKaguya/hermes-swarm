services:
  postgres:
    image: postgres:17-alpine
    container_name: hermes-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hermes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hermes_dev_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-hermes}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hermes}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hermes-swarm

  redis:
    image: redis:7-alpine
    container_name: hermes-redis
    restart: unless-stopped
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD:-hermes_redis_pwd} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-hermes_redis_pwd}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hermes-swarm

volumes:
  postgres_data:
    name: hermes_postgres_data
  redis_data:
    name: hermes_redis_data

networks:
  hermes-swarm:
    name: hermes-swarm
